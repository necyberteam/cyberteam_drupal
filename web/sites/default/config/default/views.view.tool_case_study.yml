            text: "<div class=\"grid grid-cols-1 md--grid-cols-[3fr_1fr] gap-4 border-t-14 border-md-teal rounded-tl-lg\" id=\"{{ title|clean_id }}\">\r\n  <div class=\"relative\">\r\n    <!-- Main content (75%) -->\r\n    <h2 class=\"my-3\">{{ title }}</h2>\r\n\r\n    <!-- Clipboard copy function :: Do not edit :: Over written in access_misc.module -->\r\n      COPYCLIP_GOES_HERE\r\n    <!-- End Clipboard copy function -->\r\n\r\n    <div class=\"tcs-researchers-block flex gap-3\">\r\n      <div class=\"tcs-researchers-block__photo flex-shrink-0\">\r\n        {{ user_picture }}\r\n      </div>\r\n\r\n      <div class=\"tcs-researchers-block__info\">\r\n        <div class=\"tcs-researchers-block__name\">\r\n          {{ field_tcs_researcher_name }}\r\n        </div>\r\n        <div class=\"tcs-researchers-block__institution text-muted small\">\r\n          {{ field_tcs_institution }}\r\n        </div>\r\n      </div>\r\n    </div>\r\n\r\n    {% if field_tcs_research_topic %}\r\n      <h2 class=\"h4 text-xl p-2 font-bold leading-5 text-dark-teal m-0 bg-light-teal uppercase w-full mt-4\">Research Topic</h2>\r\n      {{ field_tcs_research_topic }}\r\n    {% endif %}\r\n    {% if body %}\r\n      <h2 class=\"h4 text-xl p-2 font-bold leading-5 text-dark-teal m-0 bg-light-teal uppercase w-full mt-4\">Project Summary</h2>\r\n      <div class=\"project-summary\">\r\n        {{ body }}\r\n      </div>\r\n    {% endif %}\r\n  </div>\r\n\r\n  <div>\r\n    <!-- Sidebar (25%) -->\r\n    {{ field_tcs_main_image }}\r\n    {% if field_tcs_access_tools_used %}\r\n      <h2 class=\"h4 text-base p-2 font-bold leading-5 text-white m-0 bg-md-teal uppercase w-full\">Access Tools</h2>\r\n      <!-- Access Tools :: Do not edit :: Over written in access_misc.module -->\r\n      ACCESS_TOOLS:{{ field_tcs_access_tools_used }}\r\n      <!-- End Access Tools -->\r\n    {% endif %}\r\n\r\n    <h2 class=\"h4 text-base p-2 font-bold leading-5 text-white m-0 bg-md-teal uppercase w-full\">Allocation Information</h2>\r\n    <dl class=\"allocation-information\">\r\n      <dt>ACCESS Resource:</dt>\r\n      <dd>{{ field_tcs_access_resource }}</dd>\r\n\r\n      <dt>Allocation Type:</dt>\r\n      <dd>{{ field_tcs_allocation_type }}</dd>\r\n\r\n      <dt>Field of Science:</dt>\r\n      <dd>{{ field_tcs_field_of_science }}</dd>\r\n\r\n      <dt>Service Units:</dt>\r\n      <dd>{{ field_tcs_service_units }}</dd>\r\n\r\n      <dt>Time to Science:</dt>\r\n      <dd>{{ field_tcs_time_to_science }}</dd>\r\n\r\n      <dt>GPU Hours:</dt>\r\n      <dd>{{ field_tcs_total_cpu_gpu_hours }}</dd>\r\n    </dl>\r\n\r\n    {% if field_tcs_software %}\r\n      <h2 class=\"h4 text-base p-2 font-bold leading-5 text-white m-0 bg-md-teal uppercase w-full\">Software</h2>\r\n      <div class=\"[&_ul]--list-none [&_li]--m-0\">\r\n        {{ field_tcs_software }}\r\n      </div>\r\n    {% endif %}\r\n  </div>\r\n\r\n</div>"
